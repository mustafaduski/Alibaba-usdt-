<header class="top-nav">
    <div class="search-container">
        <div class="search-bar-wrapper">
            <span class="back-arrow">‹</span>
            <div class="search-input-group">
                <input type="text" id="mainSearch" placeholder="Search products" onfocus="openSearchPanel()" oninput="handleLiveSearch()">
                <span class="camera-icon">📷</span>
            </div>
            <button class="search-btn">🔍</button>
        </div>
    </div>
</header>

<div id="searchPanel" class="amazon-search-panel">
    <div class="panel-row clickable" onclick="toggleCategories()">
        <span class="label">Browse categories</span>
        <span class="arrow">›</span>
    </div>

    <div class="panel-section">
        <div class="section-header">
            <span>Recent searches</span>
            <span class="trash-icon" onclick="clearHistory()">🗑️</span>
        </div>
        <div id="recentList" class="history-items">
            </div>
        <div class="more-btn">More <span>⌵</span></div>
    </div>

    <div class="panel-section">
        <div class="section-header">
            <span>Recommended for you</span>
            <span class="refresh-icon">🔄 Change</span>
        </div>
        <div class="recommend-items">
            <p onclick="quickSearch('new arrivals clothes')">new arrivals clothes</p>
            <p onclick="quickSearch('shoes vietnam')">shoes vietnam</p>
            <p onclick="quickSearch('white shoes')">white shoes</p>
        </div>
    </div>
</div>
