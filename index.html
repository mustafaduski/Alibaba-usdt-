<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSteam Global | Wholesale Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="alibaba-header">
        <div class="nav-container">
            <div class="logo">Auto<span>Steam</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search Alibaba products...">
                <button onclick="performSearch()">Search</button>
            </div>
            <div class="usdt-tag">TRC20 ACCEPTED ₿</div>
        </div>
    </header>

    <main class="main-layout">
        <section class="marketplace">
            <div id="productGrid" class="grid-container">
                </div>
            <div id="loading" class="loader">Loading more products...</div>
        </section>
    </main>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Product Name</h3>
            <p>Price: <span id="modalPrice">0.00</span> USDT</p>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i" alt="QR">
            </div>
            <div class="wallet-box">
                <code id="walletAddr">TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i</code>
                <button onclick="copyAddr()">Copy</button>
            </div>
            <small>Send screenshot to support for order processing.</small>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
