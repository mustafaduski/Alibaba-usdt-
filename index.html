<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoSteam Global</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="logo">Auto<span>Steam</span></div>
        <div class="search-container">
            <input type="text" id="mainSearch" placeholder="Search products...">
            <button onclick="globalSearch()">Search</button>
        </div>
    </header>

    <main id="productGrid" class="main-grid"></main>

    <div id="loader" class="loader">Loading items...</div>

    <nav class="bottom-nav">
        <div onclick="location.reload()">🏠<br>Home</div>
        <div onclick="showCart()" style="position:relative;">🛒<br>Cart <span id="cart-count">0</span></div>
        <div onclick="window.location.href='https://wa.me/964750XXXXXXX'">💬<br>Chat</div>
    </nav>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h3>Shopping Cart</h3>
            <div id="cart-items"></div>
            <hr>
            <h4>Total: <span id="total-price">0</span> USDT</h4>
            <button class="pay-btn" onclick="checkout()">Send Order via WhatsApp</button>
            <button onclick="closeCart()">Close</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
