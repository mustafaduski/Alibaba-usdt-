<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSteam | Global Trade Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">Auto<span>Steam</span>.com</div>
        <div class="search-container">
            <input type="text" id="mainSearch" placeholder="Search for products, brands, or categories...">
            <button onclick="globalSearch()">Search</button>
        </div>
    </nav>

    <div class="alibaba-layout">
        <aside class="categories-sidebar">
            <h3>Categories</h3>
            <ul id="catList">
                <li onclick="filterBy('Electronics')">Consumer Electronics</li>
                <li onclick="filterBy('Apparel')">Apparel & Accessories</li>
                <li onclick="filterBy('Home')">Home & Garden</li>
                <li onclick="filterBy('Tools')">Industrial Tools</li>
            </ul>
        </aside>

        <section class="feed">
            <div id="productGrid" class="main-grid"></div>
            <div id="scrollTrigger" class="loading">Loading more items...</div>
        </section>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content">
            <h2 id="pName"></h2>
            <p id="pPrice"></p>
            <div id="qrcode"></div>
            <code id="wallet">TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i</code>
            <button onclick="copyWallet()">Copy Address</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
