<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSteam Global | B2B Wholesale Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="alibaba-header">
        <div class="nav-container">
            <div class="logo">Auto<span>Steam</span></div>
            <div class="search-box">
                <input type="text" placeholder="Search for products or categories...">
                <button>Search</button>
            </div>
            <div class="auth-links">USDT Payments Only ₿</div>
        </div>
    </header>

    <div class="main-body">
        <aside class="sidebar">
            <h4>Source by Category</h4>
            <ul>
                <li>Industrial Machines</li>
                <li>Smart Home Tech</li>
                <li>Garment Steaming</li>
                <li>Verified Suppliers</li>
            </ul>
        </aside>

        <section class="marketplace">
            <h2 class="section-title">Verified Wholesale Products</h2>
            <div id="productGrid" class="grid-container">
                </div>
        </section>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Complete Order</h2>
            <div class="qr-placeholder">
                <img id="qrImg" src="" alt="QR">
            </div>
            <div class="wallet-info">
                <p>Transfer Network: <strong>TRC20 (Tron)</strong></p>
                <code id="walletAddr">TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i</code>
                <button onclick="copyAddr()">Copy Address</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
