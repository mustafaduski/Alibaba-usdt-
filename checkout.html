<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | AutoSteam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-item { display: flex; align-items: center; background: #fff; margin: 10px; padding: 10px; border-radius: 10px; }
        .cart-item img { width: 60px; height: 60px; border-radius: 5px; margin-right: 15px; }
        .total-box { background: #fff; padding: 20px; margin: 15px; border-radius: 15px; text-align: center; }
        .pay-btn { background: #28a745; color: white; padding: 15px; width: 90%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body style="background:#f2f2f2;">
    <h2 style="padding:20px;">Your Cart</h2>
    <div id="cart-list"></div>
    
    <div class="total-box">
        <h3>Total Amount: <span id="total-price">0</span> USDT</h3>
        <p style="font-size: 12px; color: #666;">Transfer to: TVWRheHD5zVeXeF3jnWpZrVunaTGLZza3i</p>
        <button class="pay-btn" onclick="sendToWhatsApp()">Send Receipt to WhatsApp</button>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const listDiv = document.getElementById('cart-list');
        let total = 0;

        cart.forEach(item => {
            total += (item.price * item.qty);
            listDiv.innerHTML += `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div>
                        <h4>${item.name}</h4>
                        <p>${item.qty} x ${item.price} USDT</p>
                    </div>
                </div>`;
        });
        document.getElementById('total-price').innerText = total.toFixed(2);

        function sendToWhatsApp() {
            let msg = "Hello AutoSteam, I want to buy:%0A";
            cart.forEach(i => msg += `- ${i.name} (${i.qty}x)%0A`);
            msg += `%0A*Total: ${total.toFixed(2)} USDT*`;
            window.location.href = `https://wa.me/964750XXXXXXX?text=${msg}`; // ژمارەی خۆت لێرە دابنێ
        }
    </script>
</body>
</html>
