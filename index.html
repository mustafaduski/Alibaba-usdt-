<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoSteam | Global Store</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6a00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header class="top-nav">
        <div class="logo">Auto<span>Steam</span></div>
        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="Search products...">
            <button onclick="globalSearch()">Search</button>
        </div>
    </header>

    <main id="productGrid" class="main-grid">
        </main>

    <div id="loader" class="loader">Loading...</div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()">
            <span>🏠</span><br>Home
        </div>
        <div class="nav-item" onclick="showCart()" style="position:relative;">
            <span>🛒</span><br>Cart 
            <span id="cart-count">0</span>
        </div>
        <div class="nav-item" onclick="window.location.href='https://wa.me/964750XXXXXXX'">
            <span>💬</span><br>Chat
        </div>
    </nav>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h3>Shopping Cart</h3>
            <div id="cart-items">
                </div>
            <div class="total-section">
                <hr>
                <h4>Total: <span id="total-price">0</span> USDT</h4>
                <button class="pay-btn" onclick="checkout()">Send via WhatsApp</button>
                <button class="close-btn" onclick="closeCart()">Close</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    
</body>
</html>
